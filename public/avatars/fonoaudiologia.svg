<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dra. Camila Saussure — Female, 30s, ponytail, delicate, expressive -->
  <defs>
    <radialGradient id="bg-cs" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-cs)" rx="16"/>
  <g opacity="0.95">
    <!-- Neck -->
    <path d="M 88 150 L 88 166 Q 88 171 93 174 L 107 174 Q 112 171 112 166 L 112 150" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Blouse with round collar -->
    <path d="M 55 200 Q 62 180 88 174 Q 94 180 100 181 Q 106 180 112 174 Q 138 180 145 200" fill="none" stroke="#777" stroke-width="1.3"/>
    <path d="M 82 174 Q 90 168 100 167 Q 110 168 118 174" fill="none" stroke="#999" stroke-width="0.8"/>
    <!-- Head shape — oval, delicate -->
    <ellipse cx="100" cy="104" rx="38" ry="46" fill="none" stroke="#999" stroke-width="1.6"/>
    <!-- Soft jaw -->
    <path d="M 66 110 Q 73 142 100 152 Q 127 142 134 110" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Hair — pulled back into ponytail -->
    <path d="M 60 90 Q 56 64 70 52 Q 84 42 100 40 Q 116 42 130 52 Q 144 64 140 90" fill="none" stroke="#aaa" stroke-width="1.8"/>
    <!-- Hair swept back strands -->
    <path d="M 62 86 Q 70 54 92 44" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 68 82 Q 78 52 100 42" fill="none" stroke="#999" stroke-width="0.6"/>
    <path d="M 132 82 Q 122 52 100 42" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 138 86 Q 130 54 108 44" fill="none" stroke="#999" stroke-width="0.7"/>
    <!-- Hair tucked behind ears -->
    <path d="M 60 90 Q 58 96 60 102" fill="none" stroke="#999" stroke-width="1.2"/>
    <path d="M 140 90 Q 142 96 140 102" fill="none" stroke="#999" stroke-width="1.2"/>
    <!-- Ponytail going right -->
    <path d="M 130 52 Q 148 48 158 56 Q 165 62 168 74 Q 170 86 165 100" fill="none" stroke="#999" stroke-width="1.8"/>
    <path d="M 132 54 Q 150 52 160 58 Q 166 64 168 78 Q 169 90 164 102" fill="none" stroke="#888" stroke-width="1"/>
    <path d="M 134 56 Q 152 56 162 64 Q 167 70 168 82" fill="none" stroke="#999" stroke-width="0.7"/>
    <!-- Hair tie -->
    <ellipse cx="136" cy="53" rx="4" ry="3" fill="none" stroke="#bbb" stroke-width="1.2"/>
    <!-- Ears visible -->
    <path d="M 61 96 Q 55 102 55 110 Q 55 116 61 118" fill="none" stroke="#999" stroke-width="0.9"/>
    <path d="M 139 96 Q 145 102 145 110 Q 145 116 139 118" fill="none" stroke="#999" stroke-width="0.9"/>
    <!-- Small earrings -->
    <circle cx="59" cy="119" r="1.5" fill="#bbb"/>
    <circle cx="141" cy="119" r="1.5" fill="#bbb"/>
    <!-- Eyes — warm, expressive -->
    <path d="M 73 100 Q 82 94 91 100 Q 82 105 73 100" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <path d="M 109 100 Q 118 94 127 100 Q 118 105 109 100" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <circle cx="82" cy="99.5" r="3.5" fill="#333"/>
    <circle cx="118" cy="99.5" r="3.5" fill="#333"/>
    <circle cx="83" cy="98" r="1.2" fill="#888"/>
    <circle cx="119" cy="98" r="1.2" fill="#888"/>
    <!-- Upper lash -->
    <path d="M 73 100 Q 82 93 91 100" fill="none" stroke="#999" stroke-width="1.8"/>
    <path d="M 109 100 Q 118 93 127 100" fill="none" stroke="#999" stroke-width="1.8"/>
    <!-- Lash tips -->
    <path d="M 73 100 L 70 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 91 100 L 94 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 109 100 L 106 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 127 100 L 130 97" stroke="#999" stroke-width="0.6"/>
    <!-- Eyebrows — arched, expressive -->
    <path d="M 71 90 Q 82 84 93 89" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 107 89 Q 118 84 129 90" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Nose — small, delicate -->
    <path d="M 100 97 L 98 116 Q 96 120 94 119" fill="none" stroke="#888" stroke-width="0.8"/>
    <path d="M 98 116 Q 100 121 106 119" fill="none" stroke="#888" stroke-width="0.6"/>
    <!-- Warm open smile -->
    <path d="M 84 134 Q 92 142 100 141 Q 108 142 116 134" fill="none" stroke="#999" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 87 134 Q 94 131 100 133 Q 106 131 113 134" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Dimples -->
    <path d="M 80 133 Q 82 136 83 133" fill="none" stroke="#888" stroke-width="0.4"/>
    <path d="M 117 133 Q 118 136 120 133" fill="none" stroke="#888" stroke-width="0.4"/>
  </g>
</svg>