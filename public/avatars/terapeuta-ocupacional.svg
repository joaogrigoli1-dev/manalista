<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dra. Elena Slagle — Female, 40s, shoulder-length curly hair, warm, grounded -->
  <defs>
    <radialGradient id="bg-es" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-es)" rx="16"/>
  <g opacity="0.95">
    <!-- Neck -->
    <path d="M 88 150 L 88 168 Q 88 173 93 176 L 107 176 Q 112 173 112 168 L 112 150" fill="none" stroke="#888" stroke-width="1"/>
    <!-- V-neck top -->
    <path d="M 52 200 Q 58 182 86 176 Q 93 182 100 184 Q 107 182 114 176 Q 142 182 148 200" fill="none" stroke="#777" stroke-width="1.3"/>
    <path d="M 86 176 Q 93 186 100 188" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 114 176 Q 107 186 100 188" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Head shape — slightly rounder -->
    <ellipse cx="100" cy="104" rx="40" ry="48" fill="none" stroke="#999" stroke-width="1.6"/>
    <!-- Jaw -->
    <path d="M 64 112 Q 72 144 100 154 Q 128 144 136 112" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Hair — voluminous curly shoulder-length -->
    <path d="M 56 88 Q 50 60 66 48 Q 82 38 100 36 Q 118 38 134 48 Q 150 60 144 88" fill="none" stroke="#aaa" stroke-width="2"/>
    <!-- Curly strands left -->
    <path d="M 56 88 Q 48 108 44 128 Q 42 142 46 158" fill="none" stroke="#999" stroke-width="1.6"/>
    <path d="M 52 92 Q 46 112 44 132 Q 43 146 48 162" fill="none" stroke="#888" stroke-width="1"/>
    <path d="M 54 96 Q 50 116 50 136 Q 50 150 54 165" fill="none" stroke="#999" stroke-width="0.8"/>
    <!-- Curl waves left -->
    <path d="M 48 115 Q 44 120 48 125" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 46 135 Q 42 140 46 145" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 48 152 Q 44 157 48 162" fill="none" stroke="#888" stroke-width="0.5"/>
    <!-- Curly strands right -->
    <path d="M 144 88 Q 152 108 156 128 Q 158 142 154 158" fill="none" stroke="#999" stroke-width="1.6"/>
    <path d="M 148 92 Q 154 112 156 132 Q 157 146 152 162" fill="none" stroke="#888" stroke-width="1"/>
    <path d="M 146 96 Q 150 116 150 136 Q 150 150 146 165" fill="none" stroke="#999" stroke-width="0.8"/>
    <!-- Curl waves right -->
    <path d="M 152 115 Q 156 120 152 125" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 154 135 Q 158 140 154 145" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 152 152 Q 156 157 152 162" fill="none" stroke="#888" stroke-width="0.5"/>
    <!-- Hair top -->
    <path d="M 60 82 Q 68 52 88 42" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 72 78 Q 82 50 100 40" fill="none" stroke="#999" stroke-width="0.6"/>
    <path d="M 128 78 Q 118 50 100 40" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 140 82 Q 132 52 112 42" fill="none" stroke="#999" stroke-width="0.7"/>
    <!-- Center part -->
    <path d="M 100 36 L 100 52" fill="none" stroke="#bbb" stroke-width="0.5"/>
    <!-- Ears partially hidden -->
    <path d="M 60 98 Q 55 104 56 112 Q 57 118 62 120" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Eyes — kind, deep -->
    <path d="M 72 100 Q 82 94 92 100 Q 82 106 72 100" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <path d="M 108 100 Q 118 94 128 100 Q 118 106 108 100" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <circle cx="82" cy="99.5" r="3.5" fill="#333"/>
    <circle cx="118" cy="99.5" r="3.5" fill="#333"/>
    <circle cx="83" cy="98" r="1.2" fill="#888"/>
    <circle cx="119" cy="98" r="1.2" fill="#888"/>
    <!-- Upper lash -->
    <path d="M 72 100 Q 82 93 92 100" fill="none" stroke="#999" stroke-width="1.8"/>
    <path d="M 108 100 Q 118 93 128 100" fill="none" stroke="#999" stroke-width="1.8"/>
    <!-- Lash tips -->
    <path d="M 72 100 L 69 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 92 100 L 95 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 108 100 L 105 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 128 100 L 131 97" stroke="#999" stroke-width="0.6"/>
    <!-- Eyebrows — natural, warm -->
    <path d="M 70 90 Q 82 85 94 90" fill="none" stroke="#999" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 106 90 Q 118 85 130 90" fill="none" stroke="#999" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M 100 97 L 98 118 Q 96 122 93 120" fill="none" stroke="#888" stroke-width="0.9"/>
    <path d="M 98 118 Q 100 123 107 120" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Gentle smile with crow's feet -->
    <path d="M 84 136 Q 92 143 100 142 Q 108 143 116 136" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 87 136 Q 94 133 100 134 Q 106 133 113 136" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Smile lines -->
    <path d="M 72 118 Q 76 128 82 135" fill="none" stroke="#888" stroke-width="0.5"/>
    <path d="M 128 118 Q 124 128 118 135" fill="none" stroke="#888" stroke-width="0.5"/>
  </g>
</svg>