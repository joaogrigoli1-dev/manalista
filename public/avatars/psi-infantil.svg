  <path d="M 54 88 Q 60 90 66 88" stroke="#D4AF37" stroke-width="1" fill="none"/>
  <circle cx="60" cy="91" r="1.2" fill="#D4AF37"/>
  <!-- Lab coat detail -->
  <line x1="35" y1="82" x2="35" y2="120" stroke="#E8E8E8" stroke-width="1" opacity="0.6"/>
  <line x1="85" y1="82" x2="85" y2="120" stroke="#E8E8E8" stroke-width="1" opacity="0.6"/>
