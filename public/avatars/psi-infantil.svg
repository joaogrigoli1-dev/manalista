<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D8A878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C98F68;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgS" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C5CFC;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0A0A0E;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="hairS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5135;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bgS)"/>
  <!-- Hair wavy -->
  <path d="M 28 38 Q 30 25 45 22 Q 60 20 75 22 Q 90 25 92 38 Q 80 35 60 35 Q 40 35 28 38" fill="url(#hairS)"/>
  <path d="M 25 38 Q 25 40 28 45 Q 30 50 35 52 Q 45 55 60 56 Q 75 55 85 52 Q 90 50 92 45 Q 95 40 95 38" fill="url(#hairS)" opacity="0.9"/>
  <!-- Face -->
  <ellipse cx="60" cy="68" rx="27" ry="31" fill="url(#skinS)"/>
  <!-- Ears -->
  <ellipse cx="33" cy="64" rx="5" ry="12" fill="url(#skinS)"/>
  <ellipse cx="87" cy="64" rx="5" ry="12" fill="url(#skinS)"/>
