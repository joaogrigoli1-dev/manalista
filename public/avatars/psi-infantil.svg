  <ellipse cx="50" cy="63" rx="5" ry="6.5" fill="#1a1a2e"/>
  <ellipse cx="70" cy="63" rx="5" ry="6.5" fill="#1a1a2e"/>
  <circle cx="51" cy="61" r="1.5" fill="#ffffff"/>
  <circle cx="71" cy="61" r="1.5" fill="#ffffff"/>
  <!-- Eyebrows gentle -->
  <path d="M 45 55 Q 50 53 55 55" stroke="#3A3A4A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M 65 55 Q 70 53 75 55" stroke="#3A3A4A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 60 65 L 60 77" stroke="#BA956E" stroke-width="1.2" fill="none"/>
