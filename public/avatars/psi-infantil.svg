<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dra. Sofia Vygotski — Female, 30s, warm eyes, wavy hair, kind smile -->
  <defs>
    <radialGradient id="bg-s" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-s)" rx="16"/>
  <g opacity="0.95">
    <!-- Neck -->
    <path d="M 88 152 L 88 168 Q 88 173 92 175 L 108 175 Q 112 173 112 168 L 112 152" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Blouse -->
    <path d="M 55 200 Q 60 182 85 175 Q 92 180 100 182 Q 108 180 115 175 Q 140 182 145 200" fill="none" stroke="#777" stroke-width="1.3"/>
    <path d="M 85 175 Q 92 185 100 186" fill="none" stroke="#888" stroke-width="0.8"/>
    <path d="M 115 175 Q 108 185 100 186" fill="none" stroke="#888" stroke-width="0.8"/>
    <!-- Head shape -->
    <ellipse cx="100" cy="105" rx="40" ry="48" fill="none" stroke="#999" stroke-width="1.6"/>
    <!-- Jaw -->
    <path d="M 64 112 Q 72 145 100 155 Q 128 145 136 112" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Hair — long wavy -->
    <path d="M 56 95 Q 50 65 65 52 Q 80 42 100 40 Q 120 42 135 52 Q 150 65 144 95" fill="none" stroke="#aaa" stroke-width="2"/>
    <!-- Hair strands left -->
    <path d="M 56 95 Q 48 115 42 140 Q 40 155 45 170" fill="none" stroke="#999" stroke-width="1.5"/>
    <path d="M 58 92 Q 52 110 48 135 Q 46 150 48 165" fill="none" stroke="#888" stroke-width="1"/>
    <path d="M 60 90 Q 55 108 52 128 Q 50 145 52 160" fill="none" stroke="#999" stroke-width="0.8"/>
    <!-- Hair strands right -->
    <path d="M 144 95 Q 152 115 158 140 Q 160 155 155 170" fill="none" stroke="#999" stroke-width="1.5"/>
    <path d="M 142 92 Q 148 110 152 135 Q 154 150 152 165" fill="none" stroke="#888" stroke-width="1"/>
    <path d="M 140 90 Q 145 108 148 128 Q 150 145 148 160" fill="none" stroke="#999" stroke-width="0.8"/>
    <!-- Hair top waves -->
    <path d="M 60 85 Q 65 55 80 48" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 70 80 Q 78 52 95 45" fill="none" stroke="#999" stroke-width="0.6"/>
    <path d="M 130 80 Q 122 52 105 45" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 140 85 Q 135 55 120 48" fill="none" stroke="#999" stroke-width="0.7"/>
    <!-- Eyes — almond, warm -->
    <path d="M 72 100 Q 82 94 92 100 Q 82 105 72 100" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <path d="M 108 100 Q 118 94 128 100 Q 118 105 108 100" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <circle cx="82" cy="99.5" r="3.5" fill="#333"/>
    <circle cx="118" cy="99.5" r="3.5" fill="#333"/>
    <circle cx="83" cy="98" r="1.2" fill="#888"/>
    <circle cx="119" cy="98" r="1.2" fill="#888"/>
    <!-- Upper lash — thicker -->
    <path d="M 72 100 Q 82 93 92 100" fill="none" stroke="#999" stroke-width="1.8"/>
    <path d="M 108 100 Q 118 93 128 100" fill="none" stroke="#999" stroke-width="1.8"/>
    <!-- Lashes -->
    <path d="M 72 100 L 69 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 92 100 L 95 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 108 100 L 105 97" stroke="#999" stroke-width="0.6"/>
    <path d="M 128 100 L 131 97" stroke="#999" stroke-width="0.6"/>
    <!-- Eyebrows -->
    <path d="M 70 90 Q 82 85 94 90" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 106 90 Q 118 85 130 90" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M 100 98 L 98 118 Q 96 122 94 121" fill="none" stroke="#888" stroke-width="0.9"/>
    <path d="M 98 118 Q 100 123 106 121" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Smile -->
    <path d="M 84 135 Q 92 142 100 141 Q 108 142 116 135" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 87 135 Q 94 132 100 134 Q 106 132 113 135" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Dimples -->
    <path d="M 80 134 Q 82 137 83 134" fill="none" stroke="#888" stroke-width="0.4"/>
    <path d="M 117 134 Q 118 137 120 134" fill="none" stroke="#888" stroke-width="0.4"/>
  </g>
</svg>