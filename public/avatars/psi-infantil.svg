  <path d="M 48 82 Q 60 87 72 82" stroke="#A97C60" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 48 82 Q 60 85 72 82" fill="#D4A574" opacity="0.3"/>
  <!-- Lab coat -->
  <path d="M 28 92 L 30 86 L 40 82 L 60 80 L 80 82 L 90 86 L 92 92 L 92 120 L 28 120 Z" fill="#F5F5F5"/>
