<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dra. Íris Skinner — Female, 35, modern, short bob, confident -->
  <defs>
    <radialGradient id="bg-i" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-i)" rx="16"/>
  <g opacity="0.95">
    <!-- Neck -->
    <path d="M 88 150 L 88 166 Q 88 171 93 174 L 107 174 Q 112 171 112 166 L 112 150" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Collar / blouse -->
    <path d="M 55 200 Q 62 180 88 174 Q 94 180 100 181 Q 106 180 112 174 Q 138 180 145 200" fill="none" stroke="#777" stroke-width="1.3"/>
    <!-- V-neck -->
    <path d="M 88 174 Q 94 184 100 186" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 112 174 Q 106 184 100 186" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Head shape -->
    <ellipse cx="100" cy="104" rx="39" ry="47" fill="none" stroke="#999" stroke-width="1.6"/>
    <!-- Soft jaw -->
    <path d="M 65 110 Q 72 142 100 152 Q 128 142 135 110" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Hair — asymmetric bob, modern -->
    <path d="M 58 88 Q 54 62 68 50 Q 82 40 100 38 Q 118 40 132 50 Q 146 62 142 88" fill="none" stroke="#aaa" stroke-width="2"/>
    <!-- Bob left side — longer -->
    <path d="M 58 88 Q 52 108 50 130 Q 49 140 52 148" fill="none" stroke="#999" stroke-width="1.8"/>
    <path d="M 60 86 Q 55 105 54 125 Q 53 135 55 142" fill="none" stroke="#888" stroke-width="1.2"/>
    <path d="M 62 84 Q 58 102 58 120 Q 57 130 58 136" fill="none" stroke="#999" stroke-width="0.8"/>
    <!-- Bob right side — shorter, tucked -->
    <path d="M 142 88 Q 148 105 146 120 Q 145 128 142 132" fill="none" stroke="#999" stroke-width="1.8"/>
    <path d="M 140 86 Q 144 102 143 115 Q 142 122 140 126" fill="none" stroke="#888" stroke-width="1.2"/>
    <path d="M 138 84 Q 141 100 140 110 Q 139 118 138 120" fill="none" stroke="#999" stroke-width="0.8"/>
    <!-- Hair top strands -->
    <path d="M 62 82 Q 70 52 90 42" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 75 76 Q 85 48 100 42" fill="none" stroke="#999" stroke-width="0.6"/>
    <path d="M 125 76 Q 115 48 100 42" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 138 82 Q 130 52 110 42" fill="none" stroke="#999" stroke-width="0.7"/>
    <!-- Side part -->
    <path d="M 78 42 Q 76 55 72 70" fill="none" stroke="#bbb" stroke-width="0.5"/>
    <!-- Ears (left partially hidden, right visible) -->
    <path d="M 139 96 Q 146 102 145 110 Q 144 116 139 117" fill="none" stroke="#999" stroke-width="0.9"/>
    <!-- Small stud earring -->
    <circle cx="141" cy="118" r="1.2" fill="#bbb"/>
    <!-- Eyes — confident, expressive -->
    <path d="M 73 99 Q 82 93 91 99 Q 82 104 73 99" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <path d="M 109 99 Q 118 93 127 99 Q 118 104 109 99" fill="none" stroke="#aaa" stroke-width="1.3"/>
    <circle cx="82" cy="98.5" r="3.5" fill="#333"/>
    <circle cx="118" cy="98.5" r="3.5" fill="#333"/>
    <circle cx="83" cy="97" r="1.2" fill="#888"/>
    <circle cx="119" cy="97" r="1.2" fill="#888"/>
    <!-- Bold upper lash -->
    <path d="M 73 99 Q 82 92 91 99" fill="none" stroke="#999" stroke-width="2"/>
    <path d="M 109 99 Q 118 92 127 99" fill="none" stroke="#999" stroke-width="2"/>
    <!-- Lash tips -->
    <path d="M 73 99 L 70 96" stroke="#999" stroke-width="0.7"/>
    <path d="M 91 99 L 94 96" stroke="#999" stroke-width="0.7"/>
    <path d="M 109 99 L 106 96" stroke="#999" stroke-width="0.7"/>
    <path d="M 127 99 L 130 96" stroke="#999" stroke-width="0.7"/>
    <!-- Eyebrows — bold, groomed -->
    <path d="M 71 89 Q 82 84 93 89" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 107 89 Q 118 84 129 89" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Nose — defined but feminine -->
    <path d="M 100 97 L 98 116 Q 96 120 94 119" fill="none" stroke="#888" stroke-width="0.9"/>
    <path d="M 98 116 Q 100 121 106 119" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Confident smile -->
    <path d="M 84 134 Q 92 140 100 139 Q 108 140 116 134" fill="none" stroke="#999" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 87 134 Q 94 131 100 132 Q 106 131 113 134" fill="none" stroke="#888" stroke-width="0.7"/>
    <!-- Teeth hint -->
    <line x1="92" y1="134" x2="108" y2="134" stroke="#bbb" stroke-width="0.4"/>
  </g>
</svg>