<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Coord. Atlas — Male, 50s, wise, glasses, salt-pepper hair, serious -->
  <defs>
    <filter id="grain-m" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
      <feComposite in="SourceGraphic" in2="noisy" operator="in"/>
    </filter>
    <radialGradient id="bg-m" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-m)" rx="16"/>
  <g opacity="0.95">
    <!-- Neck -->
    <path d="M 85 148 L 85 170 Q 85 175 90 178 L 110 178 Q 115 175 115 170 L 115 148" fill="none" stroke="#888" stroke-width="1.2"/>
    <!-- Shirt/collar -->
    <path d="M 62 200 Q 65 180 90 178 L 100 186 L 110 178 Q 135 180 138 200" fill="none" stroke="#777" stroke-width="1.5"/>
    <line x1="100" y1="186" x2="100" y2="200" stroke="#777" stroke-width="0.8"/>
    <!-- Head shape -->
    <ellipse cx="100" cy="105" rx="42" ry="50" fill="none" stroke="#999" stroke-width="1.8"/>
    <!-- Jaw definition -->
    <path d="M 62 115 Q 70 145 100 155 Q 130 145 138 115" fill="none" stroke="#888" stroke-width="1.2"/>
    <!-- Hair — salt and pepper, swept back -->
    <path d="M 58 90 Q 55 65 70 55 Q 85 48 100 47 Q 115 48 130 55 Q 145 65 142 90" fill="none" stroke="#aaa" stroke-width="2"/>
    <path d="M 62 88 Q 65 60 80 54" fill="none" stroke="#999" stroke-width="0.8"/>
    <path d="M 68 85 Q 72 58 90 52" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 75 82 Q 80 56 100 50" fill="none" stroke="#999" stroke-width="0.6"/>
    <path d="M 125 82 Q 120 56 100 50" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 132 85 Q 128 58 110 52" fill="none" stroke="#999" stroke-width="0.7"/>
    <path d="M 138 88 Q 135 60 120 54" fill="none" stroke="#888" stroke-width="0.8"/>
    <!-- Temple graying -->
    <path d="M 60 92 Q 58 98 60 105" stroke="#bbb" stroke-width="0.6" fill="none"/>
    <path d="M 140 92 Q 142 98 140 105" stroke="#bbb" stroke-width="0.6" fill="none"/>
    <!-- Ears -->
    <path d="M 58 95 Q 50 100 50 110 Q 50 120 58 122" fill="none" stroke="#999" stroke-width="1"/>
    <path d="M 142 95 Q 150 100 150 110 Q 150 120 142 122" fill="none" stroke="#999" stroke-width="1"/>
    <!-- Eyes -->
    <ellipse cx="82" cy="102" rx="10" ry="5.5" fill="none" stroke="#aaa" stroke-width="1.2"/>
    <ellipse cx="118" cy="102" rx="10" ry="5.5" fill="none" stroke="#aaa" stroke-width="1.2"/>
    <circle cx="82" cy="102" r="3.5" fill="#333"/>
    <circle cx="118" cy="102" r="3.5" fill="#333"/>
    <circle cx="83.5" cy="100.5" r="1" fill="#888"/>
    <circle cx="119.5" cy="100.5" r="1" fill="#888"/>
    <!-- Glasses -->
    <rect x="69" y="95" width="26" height="16" rx="3" fill="none" stroke="#bbb" stroke-width="1.5"/>
    <rect x="105" y="95" width="26" height="16" rx="3" fill="none" stroke="#bbb" stroke-width="1.5"/>
    <line x1="95" y1="102" x2="105" y2="102" stroke="#bbb" stroke-width="1.2"/>
    <line x1="69" y1="100" x2="58" y2="97" stroke="#bbb" stroke-width="1"/>
    <line x1="131" y1="100" x2="142" y2="97" stroke="#bbb" stroke-width="1"/>
    <!-- Eyebrows -->
    <path d="M 72 90 Q 82 86 94 90" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 106 90 Q 118 86 128 90" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M 100 98 L 98 120 Q 95 126 92 124" fill="none" stroke="#999" stroke-width="1"/>
    <path d="M 100 120 Q 105 126 108 124" fill="none" stroke="#888" stroke-width="0.8"/>
    <!-- Mouth -->
    <path d="M 86 136 Q 93 140 100 139 Q 107 140 114 136" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 90 136 Q 100 132 110 136" fill="none" stroke="#888" stroke-width="0.6"/>
    <!-- Cheek lines / expression wrinkles -->
    <path d="M 72 120 Q 75 128 80 132" fill="none" stroke="#888" stroke-width="0.5"/>
    <path d="M 128 120 Q 125 128 120 132" fill="none" stroke="#888" stroke-width="0.5"/>
    <!-- Forehead lines -->
    <path d="M 75 80 Q 100 77 125 80" fill="none" stroke="#888" stroke-width="0.4"/>
    <path d="M 78 84 Q 100 81 122 84" fill="none" stroke="#888" stroke-width="0.4"/>
    <!-- Cross-hatching shading -->
    <g opacity="0.15" stroke="#fff" stroke-width="0.3">
      <line x1="65" y1="95" x2="75" y2="85"/>
      <line x1="125" y1="85" x2="135" y2="95"/>
      <line x1="80" y1="145" x2="90" y2="140"/>
      <line x1="110" y1="140" x2="120" y2="145"/>
    </g>
  </g>
</svg>