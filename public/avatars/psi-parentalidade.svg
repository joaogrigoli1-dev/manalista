<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C89868;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgV" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E5725C;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0A0A0E;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="hairV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B6B47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B4427;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="beardV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A87548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B5535;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bgV)"/>
  <!-- Hair -->
  <path d="M 28 35 Q 28 25 60 25 Q 92 25 92 35 L 92 55 Q 75 50 60 50 Q 45 50 28 55 Z" fill="url(#hairV)"/>
  <!-- Face -->
  <ellipse cx="60" cy="68" rx="27" ry="31" fill="url(#skinV)"/>
  <!-- Ears -->
  <ellipse cx="33" cy="64" rx="5.5" ry="12" fill="url(#skinV)"/>
  <ellipse cx="87" cy="64" rx="5.5" ry="12" fill="url(#skinV)"/>
  <!-- Beard -->
  <path d="M 42 78 Q 50 85 60 86 Q 70 85 78 78" fill="url(#beardV)" opacity="0.7"/>
  <path d="M 45 80 Q 60 83 75 80" fill="url(#beardV)" opacity="0.4"/>
  <!-- Eyes empathetic -->
  <ellipse cx="50" cy="62" rx="5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="70" cy="62" rx="5" ry="6" fill="#1a1a2e"/>
  <circle cx="51" cy="60" r="1.5" fill="#ffffff"/>
  <circle cx="71" cy="60" r="1.5" fill="#ffffff"/>
  <!-- Eyebrows warm -->
  <path d="M 44 54 Q 50 52 56 54" stroke="#3A3A4A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M 64 54 Q 70 52 76 54" stroke="#3A3A4A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 60 64 L 60 76" stroke="#B8926A" stroke-width="1.2" fill="none"/>
  <!-- Mouth paternal smile -->
  <path d="M 50 82 Q 60 86 70 82" stroke="#A67C5C" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Dress shirt -->
  <path d="M 28 92 L 30 85 L 40 81 L 60 79 L 80 81 L 90 85 L 92 92 L 92 120 L 28 120 Z" fill="#E8E4DC"/>
  <!-- Open collar shirt detail -->
  <path d="M 50 84 L 52 88 L 60 87 L 68 88 L 70 84" fill="#E8E4DC" stroke="#C9C3B8" stroke-width="0.8"/>
  <path d="M 48 86 Q 60 89 72 86" stroke="#C9C3B8" stroke-width="1"/>
