<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dr. Marco Cajal — Male, 50s, distinguished, receding hairline, lab coat feel -->
  <defs>
    <radialGradient id="bg-mc" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-mc)" rx="16"/>
  <g opacity="0.95">
    <!-- Neck -->
    <path d="M 86 150 L 86 170 Q 86 175 92 178 L 108 178 Q 114 175 114 170 L 114 150" fill="none" stroke="#888" stroke-width="1.2"/>
    <!-- Lab coat / collar -->
    <path d="M 50 200 Q 55 182 86 178 L 92 185 L 100 178 L 108 185 L 114 178 Q 145 182 150 200" fill="none" stroke="#bbb" stroke-width="1.5"/>
    <line x1="100" y1="178" x2="100" y2="200" stroke="#999" stroke-width="0.8"/>
    <!-- Lapels -->
    <path d="M 86 178 L 75 200" stroke="#aaa" stroke-width="0.8"/>
    <path d="M 114 178 L 125 200" stroke="#aaa" stroke-width="0.8"/>
    <!-- Head shape — more angular -->
    <ellipse cx="100" cy="103" rx="43" ry="50" fill="none" stroke="#999" stroke-width="1.8"/>
    <!-- Strong jaw -->
    <path d="M 60 112 Q 68 146 100 156 Q 132 146 140 112" fill="none" stroke="#888" stroke-width="1.2"/>
    <!-- Hair — receding, distinguished -->
    <path d="M 62 85 Q 60 62 75 52 Q 90 44 100 43 Q 110 44 125 52 Q 140 62 138 85" fill="none" stroke="#aaa" stroke-width="1.8"/>
    <!-- Receding hairline — higher forehead -->
    <path d="M 68 82 Q 72 60 90 52" fill="none" stroke="#999" stroke-width="0.7"/>
    <path d="M 80 78 Q 86 56 100 48" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 120 78 Q 114 56 100 48" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 132 82 Q 128 60 110 52" fill="none" stroke="#999" stroke-width="0.7"/>
    <!-- Gray temples -->
    <path d="M 60 88 Q 58 95 60 104" stroke="#ccc" stroke-width="0.7" fill="none"/>
    <path d="M 62 90 Q 60 97 62 106" stroke="#bbb" stroke-width="0.5" fill="none"/>
    <path d="M 140 88 Q 142 95 140 104" stroke="#ccc" stroke-width="0.7" fill="none"/>
    <path d="M 138 90 Q 140 97 138 106" stroke="#bbb" stroke-width="0.5" fill="none"/>
    <!-- Ears -->
    <path d="M 57 94 Q 50 100 50 110 Q 50 118 57 120" fill="none" stroke="#999" stroke-width="1"/>
    <path d="M 143 94 Q 150 100 150 110 Q 150 118 143 120" fill="none" stroke="#999" stroke-width="1"/>
    <!-- Eyes — deep, focused, slight squint -->
    <ellipse cx="82" cy="100" rx="10" ry="4.5" fill="none" stroke="#aaa" stroke-width="1.2"/>
    <ellipse cx="118" cy="100" rx="10" ry="4.5" fill="none" stroke="#aaa" stroke-width="1.2"/>
    <circle cx="82" cy="100" r="3.2" fill="#333"/>
    <circle cx="118" cy="100" r="3.2" fill="#333"/>
    <circle cx="83" cy="98.5" r="1" fill="#888"/>
    <circle cx="119" cy="98.5" r="1" fill="#888"/>
    <!-- Heavy eyelids -->
    <path d="M 72 98 Q 82 94 92 98" fill="none" stroke="#999" stroke-width="1.5"/>
    <path d="M 108 98 Q 118 94 128 98" fill="none" stroke="#999" stroke-width="1.5"/>
    <!-- Eyebrows — bushy, authoritative -->
    <path d="M 70 88 Q 82 82 94 87" fill="none" stroke="#aaa" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 106 87 Q 118 82 130 88" fill="none" stroke="#aaa" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Nose — prominent -->
    <path d="M 100 96 L 97 120 Q 93 126 89 123" fill="none" stroke="#999" stroke-width="1.1"/>
    <path d="M 97 120 Q 100 127 111 123" fill="none" stroke="#888" stroke-width="0.9"/>
    <!-- Nasolabial folds -->
    <path d="M 74 115 Q 78 125 82 132" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 126 115 Q 122 125 118 132" fill="none" stroke="#888" stroke-width="0.6"/>
    <!-- Mouth — firm, serious -->
    <path d="M 86 136 Q 94 139 100 138 Q 106 139 114 136" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 89 136 Q 95 133 100 134 Q 105 133 111 136" fill="none" stroke="#888" stroke-width="0.6"/>
    <!-- Chin cleft -->
    <path d="M 98 148 Q 100 152 102 148" fill="none" stroke="#888" stroke-width="0.5"/>
    <!-- Forehead wrinkles -->
    <path d="M 76 76 Q 100 73 124 76" fill="none" stroke="#888" stroke-width="0.4"/>
    <path d="M 78 80 Q 100 77 122 80" fill="none" stroke="#888" stroke-width="0.4"/>
  </g>
</svg>