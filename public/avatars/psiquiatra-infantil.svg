<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dr. Rafael Kanner — Male, 40s, glasses, trimmed beard, scholarly -->
  <defs>
    <radialGradient id="bg-rk" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-rk)" rx="16"/>
  <g opacity="0.95">
    <!-- Neck -->
    <path d="M 86 150 L 86 170 Q 86 175 92 178 L 108 178 Q 114 175 114 170 L 114 150" fill="none" stroke="#888" stroke-width="1.2"/>
    <!-- Dress shirt + tie -->
    <path d="M 50 200 Q 56 182 86 178 L 92 186 L 100 178 L 108 186 L 114 178 Q 144 182 150 200" fill="none" stroke="#999" stroke-width="1.4"/>
    <line x1="100" y1="178" x2="100" y2="200" stroke="#888" stroke-width="1"/>
    <!-- Tie knot -->
    <path d="M 96 180 L 100 178 L 104 180 L 102 186 L 98 186 Z" fill="none" stroke="#aaa" stroke-width="0.8"/>
    <!-- Tie -->
    <path d="M 98 186 L 97 200" stroke="#888" stroke-width="0.8"/>
    <path d="M 102 186 L 103 200" stroke="#888" stroke-width="0.8"/>
    <!-- Head shape — angular, masculine -->
    <ellipse cx="100" cy="102" rx="42" ry="50" fill="none" stroke="#999" stroke-width="1.8"/>
    <!-- Strong jaw -->
    <path d="M 62 112 Q 70 145 100 155 Q 130 145 138 112" fill="none" stroke="#888" stroke-width="1.2"/>
    <!-- Hair — neat, side-parted, full -->
    <path d="M 60 86 Q 56 60 72 48 Q 88 38 100 37 Q 112 38 128 48 Q 144 60 140 86" fill="none" stroke="#aaa" stroke-width="1.8"/>
    <!-- Side part left -->
    <path d="M 76 40 Q 74 52 70 68" fill="none" stroke="#bbb" stroke-width="0.6"/>
    <!-- Hair strands -->
    <path d="M 62 82 Q 68 54 86 42" fill="none" stroke="#888" stroke-width="0.7"/>
    <path d="M 70 78 Q 78 50 100 40" fill="none" stroke="#999" stroke-width="0.6"/>
    <path d="M 130 78 Q 122 50 100 40" fill="none" stroke="#888" stroke-width="0.6"/>
    <path d="M 138 82 Q 132 54 114 42" fill="none" stroke="#999" stroke-width="0.7"/>
    <!-- Hair side volume -->
    <path d="M 60 86 Q 56 94 58 104" fill="none" stroke="#999" stroke-width="1.2"/>
    <path d="M 140 86 Q 144 94 142 104" fill="none" stroke="#999" stroke-width="1.2"/>
    <!-- Ears -->
    <path d="M 57 94 Q 50 100 50 110 Q 50 118 57 120" fill="none" stroke="#999" stroke-width="0.9"/>
    <path d="M 143 94 Q 150 100 150 110 Q 150 118 143 120" fill="none" stroke="#999" stroke-width="0.9"/>
    <!-- Glasses — round scholarly -->
    <circle cx="80" cy="98" r="14" fill="none" stroke="#bbb" stroke-width="1.4"/>
    <circle cx="120" cy="98" r="14" fill="none" stroke="#bbb" stroke-width="1.4"/>
    <!-- Bridge -->
    <path d="M 94 98 Q 100 94 106 98" fill="none" stroke="#bbb" stroke-width="1.2"/>
    <!-- Temple arms -->
    <path d="M 66 96 L 57 94" stroke="#bbb" stroke-width="1"/>
    <path d="M 134 96 L 143 94" stroke="#bbb" stroke-width="1"/>
    <!-- Eyes behind glasses — focused, intelligent -->
    <path d="M 72 98 Q 80 93 88 98 Q 80 103 72 98" fill="none" stroke="#aaa" stroke-width="1.1"/>
    <path d="M 112 98 Q 120 93 128 98 Q 120 103 112 98" fill="none" stroke="#aaa" stroke-width="1.1"/>
    <circle cx="80" cy="97.5" r="3" fill="#333"/>
    <circle cx="120" cy="97.5" r="3" fill="#333"/>
    <circle cx="81" cy="96.5" r="1" fill="#888"/>
    <circle cx="121" cy="96.5" r="1" fill="#888"/>
    <!-- Heavy eyelids -->
    <path d="M 72 97 Q 80 93 88 97" fill="none" stroke="#999" stroke-width="1.3"/>
    <path d="M 112 97 Q 120 93 128 97" fill="none" stroke="#999" stroke-width="1.3"/>
    <!-- Eyebrows — distinguished -->
    <path d="M 68 86 Q 80 80 92 85" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 108 85 Q 120 80 132 86" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Nose — defined -->
    <path d="M 100 96 L 98 118 Q 94 124 90 122" fill="none" stroke="#999" stroke-width="1"/>
    <path d="M 98 118 Q 100 125 110 122" fill="none" stroke="#888" stroke-width="0.8"/>
    <!-- Trimmed beard — jawline only -->
    <path d="M 68 126 Q 72 136 80 142" fill="none" stroke="#888" stroke-width="0.8"/>
    <path d="M 132 126 Q 128 136 120 142" fill="none" stroke="#888" stroke-width="0.8"/>
    <!-- Goatee / chin stubble -->
    <path d="M 88 146 Q 94 152 100 154 Q 106 152 112 146" fill="none" stroke="#888" stroke-width="0.9"/>
    <path d="M 90 148 Q 96 153 100 154 Q 104 153 110 148" fill="none" stroke="#777" stroke-width="0.5"/>
    <!-- Mustache -->
    <path d="M 86 128 Q 92 132 100 131 Q 108 132 114 128" fill="none" stroke="#888" stroke-width="0.9"/>
    <!-- Mouth — thoughtful -->
    <path d="M 86 134 Q 94 138 100 137 Q 106 138 114 134" fill="none" stroke="#999" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 90 134 Q 96 132 100 133 Q 104 132 110 134" fill="none" stroke="#888" stroke-width="0.6"/>
    <!-- Nasolabial folds -->
    <path d="M 74 115 Q 78 124 84 132" fill="none" stroke="#888" stroke-width="0.5"/>
    <path d="M 126 115 Q 122 124 116 132" fill="none" stroke="#888" stroke-width="0.5"/>
  </g>
</svg>