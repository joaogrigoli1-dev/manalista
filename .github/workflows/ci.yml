name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type-check · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://manalista.com.br
          NEXT_PUBLIC_BUILD_ID: ${{ github.sha }}
          # Placeholders para o build passar sem segredos reais
          NEXTAUTH_URL: https://manalista.com.br
          NEXTAUTH_SECRET: ci-placeholder-not-a-real-secret-32chars
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          AWS_REGION: us-east-1

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  deploy:
    name: Deploy via Coolify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify webhook
        run: |
          curl -fsSL -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Aguardar deploy (90s) e smoke test
        run: |
          sleep 90
          curl -fsS https://manalista.com.br/api/health | grep -q '"status":"ok"'
          echo "Deploy OK"
